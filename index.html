
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Checker + Countdown</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    height: 100vh;
    color: white;
}

h1 {
    margin-top: 40px;
}

.input-box {
    margin-top: 20px;
}

input, select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #ff4081;
    color: white;
    cursor: pointer;
}

#result {
    margin-top: 30px;
    font-size: 28px;
}

/* Countdown style */
#countdown {
    margin-top: 30px;
    font-size: 25px;
}
</style>
</head>

<body>

<h1>🎉 Birthday Checker 🎉</h1>

<div class="input-box">
    <input type="number" id="day" placeholder="Enter Day (1-31)">

    <select id="month">
        <option value="">Select Month</option>
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
    </select>

    <button onclick="checkBirthday()">Check</button>
</div>

<div id="result"></div>
<div id="countdown"></div>

<script>
function checkBirthday() {

    let day = document.getElementById("day").value;
    let month = document.getElementById("month").value;

    if (day === "" || month === "") {
        alert("Please enter valid date!");
        return;
    }

    let today = new Date();

    // 🎂 If today is birthday
    if (
        today.getDate() == day &&
        today.getMonth() == month
    ) {
        document.getElementById("result").innerHTML = "🎂 Happy Birthday 🎂";
        document.getElementById("countdown").innerHTML = "";
        return;
    }

    // ⏳ Else → start countdown
    document.getElementById("result").innerHTML = "🎉 Not today! Countdown started ⏳";

    let year = today.getFullYear();
    let nextBirthday = new Date(year, month, day);

    // if already passed → next year
    if (nextBirthday < today) {
        nextBirthday.setFullYear(year + 1);
    }

    setInterval(function() {

        let now = new Date().getTime();
        let diff = nextBirthday - now;

        let d = Math.floor(diff / (1000 * 60 * 60 * 24));
        let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            d + " Days " + h + " Hours " + m + " Minutes " + s + " Seconds";

    }, 1000);
}
</script>

</body>
</html>
