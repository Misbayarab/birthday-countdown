
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Checker + Countdown</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    height: 100vh;
    color: white;
    overflow: hidden;
}

/* Title */
h1 {
    margin-top: 30px;
}

/* Input */
.input-box {
    margin-top: 20px;
}

input, select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #ff4081;
    color: white;
    cursor: pointer;
}

/* Output */
#result {
    margin-top: 30px;
    font-size: 28px;
}

#countdown {
    margin-top: 20px;
    font-size: 25px;
}

/* 🧍‍♀️ Standing dolls */
.doll {
    position: absolute;
    bottom: 0;
    font-size: 120px;
}

/* Left doll */
.left {
    left: 5%;
}

/* Right doll */
.right {
    right: 5%;
}

/* Cake in hands */
.cake {
    position: absolute;
    bottom: 120px;
    font-size: 60px;
}

/* Cake positions */
.left-cake {
    left: 8%;
}

.right-cake {
    right: 8%;
}
</style>
</head>

<body>

<h1>🎉 Birthday Checker 🎉</h1>

<div class="input-box">
    <input type="number" id="day" placeholder="Enter Day (1-31)">

    <select id="month">
        <option value="">Select Month</option>
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
    </select>

    <button onclick="checkBirthday()">Check</button>
</div>

<div id="result"></div>
<div id="countdown"></div>

<!-- 🧍‍♀️ Standing Dolls -->
<div class="doll left">👧</div>
<div class="doll right">👧</div>

<!-- 🎂 Cakes in hands -->
<div class="cake left-cake">🎂</div>
<div class="cake right-cake">🎂</div>

<script>
let interval;

function checkBirthday() {

    clearInterval(interval);

    let day = document.getElementById("day").value;
    let month = document.getElementById("month").value;

    if (day === "" || month === "") {
        alert("Please enter valid date!");
        return;
    }

    let today = new Date();

    if (today.getDate() == day && today.getMonth() == month) {
        document.getElementById("result").innerHTML = "🎂 Happy Birthday 🎂";
        document.getElementById("countdown").innerHTML = "";
        return;
    }

    document.getElementById("result").innerHTML = "🎉 Not today! Countdown started ⏳";

    let year = today.getFullYear();
    let nextBirthday = new Date(year, month, day);

    if (nextBirthday < today) {
        nextBirthday.setFullYear(year + 1);
    }

    interval = setInterval(function() {

        let now = new Date().getTime();
        let diff = nextBirthday - now;

        if (diff <= 0) {
            clearInterval(interval);
            document.getElementById("result").innerHTML = "🎂 Happy Birthday 🎂";
            document.getElementById("countdown").innerHTML = "";
            return;
        }

        let d = Math.floor(diff / (1000 * 60 * 60 * 24));
        let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            d + " Days " + h + " Hours " + m + " Minutes " + s + " Seconds";

    }, 1000);
}
</script>

</body>
</html>
