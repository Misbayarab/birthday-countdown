<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Birthday Countdown</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    color: white;
    text-align: center;
    background: linear-gradient(-45deg, #ff00cc, #3333ff, #00ffcc, #ff6600);
    background-size: 400% 400%;
    animation: bg 10s infinite ease-in-out;
}

/* 🌈 Background animation */
@keyframes bg {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

h1 {
    margin-top: 30px;
    font-size: 40px;
    text-shadow: 0 0 20px white;
}

/* ⏳ Grid layout */
.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 40px;
}

/* ⏳ Time boxes */
.box {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: float 3s infinite ease-in-out;
}

.box h2 {
    font-size: 28px;
}

.box p {
    font-size: 14px;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0px);}
}

/* 🎉 Surprise */
#surprise {
    display: none;
    position: absolute;
    top: 100%;
    width: 100%;
    height: 100vh;
    animation: slide 2s forwards;
}

@keyframes slide {
    to { top: 0; }
}

.big {
    margin-top: 150px;
    font-size: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white;}
    to { text-shadow: 0 0 30px yellow;}
}

/* 🎊 particles */
.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<h1>🎉 Birthday Countdown 🎉</h1>

<div class="container">
    <div class="box"><h2 id="years"></h2><p>Years</p></div>
    <div class="box"><h2 id="months"></h2><p>Months</p></div>
    <div class="box"><h2 id="weeks"></h2><p>Weeks</p></div>
    <div class="box"><h2 id="days"></h2><p>Days</p></div>
    <div class="box"><h2 id="hours"></h2><p>Hours</p></div>
    <div class="box"><h2 id="minutes"></h2><p>Minutes</p></div>
    <div class="box"><h2 id="seconds"></h2><p>Seconds</p></div>
</div>

<div id="surprise">
    <div class="big">🎂 Happy Birthday 🎂</div>
    <p style="font-size:20px;">Have an amazing year ahead 💖</p>
</div>

<script>
// 🎯 SET DATE
var birthday = new Date("April 25, 2026 00:00:00").getTime();

var x = setInterval(function() {

    var now = new Date().getTime();
    var diff = birthday - now;

    if (diff < 0) {
        clearInterval(x);
        document.querySelector(".container").style.display = "none";
        document.getElementById("surprise").style.display = "block";
        createParticles();
        return;
    }

    var seconds = Math.floor(diff / 1000);
    var minutes = Math.floor(seconds / 60);
    var hours = Math.floor(minutes / 60);
    var days = Math.floor(hours / 24);

    var years = Math.floor(days / 365);
    var months = Math.floor(days / 30);
    var weeks = Math.floor(days / 7);

    document.getElementById("years").innerHTML = years;
    document.getElementById("months").innerHTML = months % 12;
    document.getElementById("weeks").innerHTML = weeks % 4;
    document.getElementById("days").innerHTML = days % 30;
    document.getElementById("hours").innerHTML = hours % 24;
    document.getElementById("minutes").innerHTML = minutes % 60;
    document.getElementById("seconds").innerHTML = seconds % 60;

}, 1000);

// 🎊 particles
function createParticles() {
    for (let i = 0; i < 120; i++) {
        let p = document.createElement("div");
        p.classList.add("particle");
        p.style.left = Math.random() * 100 + "vw";
        p.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        p.style.animationDuration = (Math.random()*3+2) + "s";
        document.body.appendChild(p);
    }
}
</script>

</body>
</html>
